<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator In</title>
</head>
<body>
    <script>
        const person = {
            firstName: "Eko",
            lastName: "Khannedy"
        };

        if("firstName" in person){
            console.info(`Hello ${person.firstName}`);
        }else{
            console.info("Hello");
        }
    </script>
</body>
</html>
